<svg width="100%" viewBox="0 0 680 400" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Hanzawa-Kanji API 아키텍처</title>
<desc>Web Client가 HTTP로 Controller(presentation)를 호출하고, Controller는 Service(service)를 거쳐 Repository 인터페이스(persistence)를 사용합니다. In-memory 구현체가 Repository 인터페이스를 구현하고, db 로더를 통해 data.json(한자 2,136자 시드)을 로드합니다.</desc>

<style>
  .bg-gray   { fill: #F1EFE8; stroke: #5F5E5A; }
  .bg-coral  { fill: #FAECE7; stroke: #993C1D; }
  .bg-purple { fill: #EEEDFE; stroke: #534AB7; }
  .bg-teal   { fill: #E1F5EE; stroke: #0F6E56; }
  .bg-amber  { fill: #FAEEDA; stroke: #854F0B; }

  .title-gray   { fill: #2C2C2A; }
  .title-coral  { fill: #4A1B0C; }
  .title-purple { fill: #26215C; }
  .title-teal   { fill: #04342C; }
  .title-amber  { fill: #412402; }

  .sub-gray   { fill: #5F5E5A; }
  .sub-coral  { fill: #993C1D; }
  .sub-purple { fill: #534AB7; }
  .sub-teal   { fill: #0F6E56; }
  .sub-amber  { fill: #854F0B; }

  .arrow-line { stroke: #5F5E5A; }
  .layer-box  { stroke: #7F77DD; }
  .layer-text { fill: #534AB7; }

  @media (prefers-color-scheme: dark) {
    .bg-gray   { fill: #444441; stroke: #B4B2A9; }
    .bg-coral  { fill: #712B13; stroke: #F0997B; }
    .bg-purple { fill: #3C3489; stroke: #AFA9EC; }
    .bg-teal   { fill: #085041; stroke: #5DCAA5; }
    .bg-amber  { fill: #633806; stroke: #EF9F27; }

    .title-gray   { fill: #D3D1C7; }
    .title-coral  { fill: #F5C4B3; }
    .title-purple { fill: #CECBF6; }
    .title-teal   { fill: #9FE1CB; }
    .title-amber  { fill: #FAC775; }

    .sub-gray   { fill: #B4B2A9; }
    .sub-coral  { fill: #F0997B; }
    .sub-purple { fill: #AFA9EC; }
    .sub-teal   { fill: #5DCAA5; }
    .sub-amber  { fill: #EF9F27; }

    .arrow-line { stroke: #B4B2A9; }
    .layer-box  { stroke: #AFA9EC; }
    .layer-text { fill: #AFA9EC; }
  }

  .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 500; }
  .sub   { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; font-weight: 400; }
</style>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Web Client -->
<rect class="bg-gray" x="40" y="30" width="140" height="56" rx="8" stroke-width="0.5"/>
<text class="title title-gray" x="110" y="54" text-anchor="middle" dominant-baseline="central">Web Client</text>
<text class="sub sub-gray" x="110" y="72" text-anchor="middle" dominant-baseline="central">React + Vite</text>

<!-- HTTP arrow -->
<line class="arrow-line" x1="180" y1="58" x2="238" y2="58" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="sub sub-gray" x="209" y="50" text-anchor="middle">HTTP</text>

<!-- Controller -->
<rect class="bg-coral" x="240" y="30" width="200" height="56" rx="8" stroke-width="0.5"/>
<text class="title title-coral" x="340" y="54" text-anchor="middle" dominant-baseline="central">Controller</text>
<text class="sub sub-coral" x="340" y="72" text-anchor="middle" dominant-baseline="central">presentation</text>

<!-- Application layer container -->
<rect class="layer-box" x="220" y="115" width="240" height="180" rx="12" fill="none" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.6"/>
<text class="sub layer-text" x="230" y="108">service layer</text>

<!-- Controller → Service arrow -->
<line class="arrow-line" x1="340" y1="86" x2="340" y2="128" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Service -->
<rect class="bg-purple" x="240" y="130" width="200" height="56" rx="8" stroke-width="0.5"/>
<text class="title title-purple" x="340" y="154" text-anchor="middle" dominant-baseline="central">Service</text>
<text class="sub sub-purple" x="340" y="172" text-anchor="middle" dominant-baseline="central">service</text>

<!-- Service → Repository arrow -->
<line class="arrow-line" x1="340" y1="186" x2="340" y2="228" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Repository -->
<rect class="bg-purple" x="240" y="230" width="200" height="56" rx="8" stroke-width="0.5"/>
<text class="title title-purple" x="340" y="254" text-anchor="middle" dominant-baseline="central">Repository</text>
<text class="sub sub-purple" x="340" y="272" text-anchor="middle" dominant-baseline="central">persistence (interface)</text>

<!-- implements arrow (dashed) -->
<line class="arrow-line" x1="440" y1="258" x2="516" y2="258" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="sub sub-gray" x="478" y="250" text-anchor="middle">implements</text>

<!-- In-memory -->
<rect class="bg-teal" x="520" y="230" width="140" height="56" rx="8" stroke-width="0.5"/>
<text class="title title-teal" x="590" y="254" text-anchor="middle" dominant-baseline="central">In-memory</text>
<text class="sub sub-teal" x="590" y="272" text-anchor="middle" dominant-baseline="central">persistence + db</text>

<!-- In-memory → data.json arrow -->
<line class="arrow-line" x1="590" y1="286" x2="590" y2="328" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- data.json -->
<rect class="bg-amber" x="500" y="330" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="title title-amber" x="590" y="354" text-anchor="middle" dominant-baseline="central">data.json</text>
<text class="sub sub-amber" x="590" y="372" text-anchor="middle" dominant-baseline="central">한자 2,136자 시드</text>

</svg>
